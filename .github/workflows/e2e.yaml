name: e2e

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main
  schedule:
      - cron: '0 6 * * *' # 6 AM UTC everyday for default branch

  workflow_dispatch:

permissions:
  contents: read # for actions/checkout to fetch code

jobs:
  run-e2e-suite:
    runs-on: ubuntu-latest
    environment:
      name: notifications
      deployment: false
    steps:
      - name: Self Hosted Runner Post Job Cleanup Action
        uses: TooMuch4U/actions-clean@9b358e33df99574ac0bdf2e92fa3db1ae1415563
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: '${{ github.workspace }}/go.mod'
      - name: Restore Go cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: /home/runner/work/_temp/_github_home/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Setup Kubernetes
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc
        with:
          install_only: true
      - uses: yokawasa/action-setup-kube-tools@b16d49b2c459d33cf9d4c300a220ef0bcdbc730a
        with:
          kustomize: '5.7.1'
          tilt: '0.36.3'
      - name: Run E2E tests
        id: e2e-tests
        run: make e2e-verbose
      - name: Notify on Failure
        id: slack-notification
        uses: slackapi/slack-github-action@0d95c9a7becc1e6e297d76df9bc735c44f4cbcbc
        if: ${{ github.ref_name  == 'main' && github.event_name == 'schedule' && always() }}
        with:
          method: chat.postMessage
          token: ${{ secrets.OCM_GITHUB_SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "C03NF7KH128",
              "text": "${{ github.repository }} e2e Tests Status: ${{ steps.e2e-tests.conclusion }}",
              "blocks": [
                {
                  "type": "section",
                  "text":
                   {
                      "type": "mrkdwn",
                      "text": "e2e Test for OCM Controller  ${{ job.status == 'success' && ':white_check_mark:' || ':x:' }}  <https://github.com/open-component-model/ocm-controller/actions/workflows/e2e.yaml|Github Action>"
                    }
                }
              ]
            }
