name: e2e

on:
  pull_request:
    paths-ignore:
      - 'CODE_OF_CONDUCT.md'
      - 'README.md'
      - 'Contributing.md'
      - '.github/workflows/**'
    branches:
      - main

  push:
    paths-ignore:
      - '.github/workflows/**'
    branches:
      - main
  schedule:
      - cron: '0 6 * * *' # 6 AM UTC everyday for default branch

  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read # for actions/checkout to fetch code
  packages: read # for pulling private GHCR images

jobs:
  run-e2e-suite:
    runs-on: large_runner
    steps:
      - name: Self Hosted Runner Post Job Cleanup Action
        uses: TooMuch4U/actions-clean@9b358e33df99574ac0bdf2e92fa3db1ae1415563
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version-file: '${{ github.workspace }}/go.mod'
      - name: Restore Go cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: /home/runner/work/_temp/_github_home/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Setup Kubernetes
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc
        with:
          install_only: true
      - uses: yokawasa/action-setup-kube-tools@4710caf20bc62368b8edab32f7c9cc7dc3a2ac31
        with:
          kustomize: '5.7.1'
          tilt: '0.36.3'
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run E2E tests
        id: e2e-tests
        run: make e2e-verbose
      - name: Notify on Failure
        id: slack-notification
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95
        if: ${{ github.ref_name  == 'main' && github.event_name == 'schedule' && always() }}
        with:
          method: chat.postMessage
          token: ${{ secrets.OCM_GITHUB_SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "C03NF7KH128",
              "text": "${{ github.repository }} e2e Tests Status: ${{ steps.e2e-tests.conclusion }}",
              "blocks": [
                {
                  "type": "section",
                  "text":
                   {
                      "type": "mrkdwn",
                      "text": "e2e Test for OCM Controller  ${{ job.status == 'success' && ':white_check_mark:' || ':x:' }}  <https://github.com/open-component-model/ocm-controller/actions/workflows/e2e.yaml|Github Action>"
                    }
                }
              ]
            }
