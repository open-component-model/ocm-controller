# Generate TLS Certificate for registry and manager 
tlsCert:
  # If cert-manager is installed, set generateTlsCert to true to generate a cert
  generateTlsCert: false

  bootstrap:
    certificateName: "ocm-bootstrap-certificate"
    issuerName: "ocm-bootstrap-issuer"
    secretName: &tlsSecretName "ocm-registry-tls-certs"
    commonName: "cert-manager-ocm-tls"

  certificateName: *tlsSecretName
  secretName: *tlsSecretName
  issuerName: "ocm-certificate-issuer"

# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
registry:
  image:
    repository: registry
    pullPolicy: IfNotPresent
    tag: 3
    imagePullSecrets:
    # A fully qualified image should be with format [registry_hostname[:port]/][namespace/]repository_name[:tag|@digest]
    # If set, it will override the repository and tag above
    fullyQualifiedImageName: "" 
  address: registry.ocm-system.svc.cluster.local:5000
  tls:
    enabled: true
    env:
      - name: REGISTRY_HTTP_TLS_CERTIFICATE
        value: "/certs/cert.pem"
      - name: REGISTRY_HTTP_TLS_KEY
        value: "/certs/key.pem"
    volumeMounts:
      - mountPath: "/certs"
        name: *tlsSecretName
    volumes:
      - name: *tlsSecretName
        secret:
          secretName: *tlsSecretName
          items:
            - key: "tls.crt"
              path: "cert.pem"
            - key: "tls.key"
              path: "key.pem"
            - key: "ca.crt"
              path: "ca.pem"
  resources:
    limits:
      memory: 1024Mi
    requests:
      cpu: 200m
      memory: 512Mi
  nodeSelector: {}
  # Extra annotations merged into the registry pod template metadata.
  podAnnotations: {}
  # Extra annotations merged into the registry Service metadata.
  serviceAnnotations: {}

manager:
  replicaCount: 1
  image:
    repository: ghcr.io/open-component-model/ocm-controller
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""
    imagePullSecrets:
    # A fully qualified image should be with format [registry_hostname[:port]/][namespace/]repository_name[:tag|@digest]
    # If set, it will override the repository and tag above
    fullyQualifiedImageName: ""
  volumeMounts:
    - mountPath: "/etc/ssl/certs/registry-root.pem"
      subPath: "registry-root.pem"
      name: "certificates"

  volumes:
    - name: "certificates"
      secret:
        secretName: *tlsSecretName # must match with ocm-controller's certificate-secret-name argument
        items:
          - key: "ca.crt"
            path: "registry-root.pem"
  resources:
    limits:
      memory: 1024Mi
    requests:
      cpu: 200m
      memory: 512Mi
  kubeAPI:
    qps: 20
    burst: 30
    rateLimiterDisabled: false
  # optional values defined by the user
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # Extra annotations merged into the manager pod template metadata.
  # Useful for things like:
  #   prometheus.io/scrape: "true"
  #   prometheus.io/port: "8080"
  #   prometheus.io/path: "/metrics"
  podAnnotations: {}
  clusterRole:
    labels:
      # Users can add custom labels here
      # These labels are applied to the main ocm-controller-manager-role

    # Fine-grained role aggregation configuration
    aggregation:
      # Enable fine-grained aggregatable roles
      # When false (default), uses the existing monolithic ClusterRole
      # When true, creates 9 separate ClusterRoles with aggregation labels
      enabled: false  # DEFAULT: false for backward compatibility

      # Control which fine-grained roles aggregate to standard K8s roles
      standardRoles:
        view:
          # Aggregate read-only roles (core-reader, ocm-reader, flux-reader) to 'view'
          # This allows users with 'view' role to see OCM/Flux CRDs
          # Secrets are NOT included (handled by separate secrets-reader role)
          enabled: true
        edit:
          # Aggregate write roles to 'edit'
          # Disabled by default for security - users should explicitly opt-in
          enabled: false

      # Advanced: Individual role control (optional)
      # Most users won't need to modify these
      roles:
        coreReader:
          enabled: true
          aggregateToView: true
        secretsReader:
          enabled: true
          aggregateToView: false  # Never aggregate secrets to view
        coreWriter:
          enabled: true
          aggregateToEdit: false
        ocmReader:
          enabled: true
          aggregateToView: true
        ocmWriter:
          enabled: true
          aggregateToEdit: false
        fluxReader:
          enabled: true
          aggregateToView: true
        fluxWriter:
          enabled: true
          aggregateToEdit: false

monitoring:
  enabled: false
  # Extra annotations merged into the metrics Service metadata.
  serviceAnnotations: {}
